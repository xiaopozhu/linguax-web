name = "linguax-web"
main = "worker/index.js"
compatibility_date = "2024-12-20"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./build"

# 注意：在 Wrangler 4.x 中，[assets] 配置会自动处理静态资源绑定
# 不需要手动配置 KV 命名空间

# 自定义域名配置
[[routes]]
pattern = "linguax.app/*"
zone_name = "linguax.app"

[env.production]
[[env.production.routes]]
pattern = "linguax.app/*"
zone_name = "linguax.app" 