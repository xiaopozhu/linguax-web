<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 80" role="img" aria-labelledby="mb-t mb-d">
  <title id="mb-t">LinguaX icon in the macOS menu bar</title>
  <desc id="mb-d">A schematic of the top-right corner of the macOS menu bar showing typical status items — battery, Wi-Fi, Control Center, clock — with a small LinguaX mouse icon highlighted by a dashed circle to mark where it lives after launch.</desc>
  <style>
    .bar{fill:none;stroke:currentColor;stroke-width:1.4;opacity:.35;}
    .icon{fill:none;stroke:currentColor;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;}
    .fill{fill:currentColor;opacity:.9;}
    .subtle{fill:currentColor;opacity:.55;}
    .hi{fill:none;stroke:currentColor;stroke-width:1.5;stroke-dasharray:4 3;opacity:.9;}
    .cap{fill:currentColor;font:italic 12px -apple-system,system-ui,sans-serif;opacity:.55;}
    .tim{fill:currentColor;font:600 15px -apple-system,system-ui,sans-serif;letter-spacing:.02em;}
  </style>

  <!-- Menu bar background frame (subtle top edge) -->
  <line class="bar" x1="0" y1="4" x2="800" y2="4"/>
  <line class="bar" x1="0" y1="56" x2="800" y2="56"/>

  <!-- (spacing hint) app menu area to the left, off-frame -->
  <text class="cap" x="10" y="34">···  app menus  ···</text>

  <!-- Battery -->
  <g transform="translate(360,20)">
    <rect class="icon" x="0" y="0" width="26" height="14" rx="2.5"/>
    <rect class="fill" x="2" y="2" width="18" height="10" rx="1"/>
    <rect class="icon" x="27" y="4" width="2" height="6" rx="1"/>
  </g>

  <!-- Wi-Fi -->
  <g transform="translate(410,18)">
    <path class="icon" d="M2 12 C 6 6, 16 6, 20 12"/>
    <path class="icon" d="M5 15 C 8 11, 14 11, 17 15"/>
    <circle class="fill" cx="11" cy="18" r="1.6"/>
  </g>

  <!-- Search -->
  <g transform="translate(452,18)">
    <circle class="icon" cx="9" cy="9" r="6.5"/>
    <path class="icon" d="M14 14 L 19 19"/>
  </g>

  <!-- Control Center -->
  <g transform="translate(490,18)">
    <rect class="icon" x="0" y="0" width="24" height="18" rx="4"/>
    <line class="icon" x1="4" y1="7" x2="20" y2="7"/>
    <line class="icon" x1="4" y1="13" x2="20" y2="13"/>
    <circle class="fill" cx="9" cy="7" r="1.6"/>
    <circle class="fill" cx="15" cy="13" r="1.6"/>
  </g>

  <!-- LinguaX icon — simplified mouse, highlighted -->
  <g transform="translate(540,15)">
    <!-- Mouse silhouette -->
    <path class="icon" d="M12 2 C 18 2, 22 6, 22 14 C 22 22, 18 26, 12 26 C 6 26, 2 22, 2 14 C 2 6, 6 2, 12 2 Z"/>
    <!-- split line for L / R -->
    <line class="icon" x1="12" y1="2" x2="12" y2="12"/>
    <!-- scroll wheel -->
    <rect class="fill" x="10.5" y="6" width="3" height="6" rx="1.4"/>
    <!-- Highlight ring + arrow label -->
    <circle class="hi" cx="12" cy="14" r="18"/>
  </g>

  <!-- Callout: "LinguaX" -->
  <path class="hi" d="M542 60 L 552 74 L 578 74"/>
  <text class="cap" x="584" y="77">LinguaX</text>

  <!-- Clock -->
  <text class="tim" x="700" y="35">Mon 3:42 PM</text>
</svg>
