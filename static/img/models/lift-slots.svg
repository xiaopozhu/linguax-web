<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 340" role="img" aria-labelledby="lift-t lift-d">
  <title id="lift-t">Logi Lift — LinguaX slot layout</title>
  <desc id="lift-d">Side view of the vertical Logi Lift with its four configurable LinguaX slots: S1 and S2 side buttons on the thumb side, M wheel click, and T — the DPI / pointer-speed key on top, not a thumb button. Legend on the right.</desc>
  <style>
    .outline{fill:none;stroke:currentColor;stroke-width:2;}
    .pill{fill:currentColor;opacity:.12;stroke:currentColor;stroke-width:1.2;}
    .pt{fill:currentColor;font:600 11px -apple-system,system-ui,sans-serif;text-anchor:middle;}
    .lg-code{fill:currentColor;font:600 12px ui-monospace,SFMono-Regular,Menlo,monospace;}
    .lg-name{fill:currentColor;font:400 12.5px -apple-system,system-ui,sans-serif;opacity:.85;}
    .cap{fill:currentColor;font:italic 11.5px -apple-system,system-ui,sans-serif;opacity:.55;}
  </style>

  <!-- Vertical mouse, thumb side facing viewer; front (clicks) on the right -->
  <path class="outline" d="M60 258
    C 56 216, 66 160, 96 112
    C 118 78, 152 52, 188 48
    C 216 46, 236 62, 240 92
    C 244 122, 236 150, 224 176
    C 210 208, 202 240, 200 262
    C 198 284, 180 296, 150 296
    L 96 296
    C 72 296, 62 282, 60 258 Z"/>

  <!-- M wheel: upper front edge -->
  <rect class="pill" x="204" y="86" width="24" height="42" rx="11" transform="rotate(18 216 107)"/>
  <text class="pt" x="217" y="112">M</text>

  <!-- T: DPI key on top ridge, behind the wheel -->
  <rect class="pill" x="168" y="72" width="22" height="18" rx="9"/>
  <text class="pt" x="179" y="85">T</text>

  <!-- S1/S2 on the thumb face (center of visible side) -->
  <rect class="pill" x="118" y="170" width="26" height="18" rx="9"/>
  <text class="pt" x="131" y="183">S2</text>
  <rect class="pill" x="112" y="196" width="26" height="18" rx="9"/>
  <text class="pt" x="125" y="209">S1</text>

  <text class="cap" x="150" y="324" text-anchor="middle">side view · 57° vertical grip · thumb face toward you</text>

  <!-- Legend -->
  <g transform="translate(300,56)">
    <text class="lg-code" x="0" y="0">S1 / S2</text><text class="lg-name" x="70" y="0">side buttons — Back / Forward by default</text>
    <text class="lg-code" x="0" y="30">T</text><text class="lg-name" x="70" y="30">DPI / pointer-speed key on top —</text>
    <text class="lg-name" x="70" y="48">re-mappable; not a thumb button</text>
    <text class="lg-code" x="0" y="78">M</text><text class="lg-name" x="70" y="78">wheel click</text>
    <text class="lg-code" x="0" y="108">L / R</text><text class="lg-name" x="70" y="108">main clicks — handled by macOS</text>
    <text class="cap" x="0" y="148">4 configurable slots · full HID++ recognition</text>
    <text class="cap" x="0" y="170">left- and right-hand variants share the same slots</text>
  </g>
</svg>
