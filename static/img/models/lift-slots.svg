<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 350" role="img" aria-labelledby="lift-t lift-d">
  <title id="lift-t">Logi Lift — LinguaX slot layout</title>
  <desc id="lift-d">Side wireframe of the vertical Logi Lift, thumb face toward the viewer, front to the right. Slots: S1 and S2 on the thumb face, M wheel click on the top-front edge, T the DPI / pointer-speed key on the top ridge. Legend on the right.</desc>
  <style>
    .outline{fill:none;stroke:currentColor;stroke-width:2;stroke-linejoin:round;}
    .inner{fill:none;stroke:currentColor;stroke-width:1.2;opacity:.45;}
    .pill{fill:currentColor;opacity:.12;stroke:currentColor;stroke-width:1.2;}
    .pt{fill:currentColor;font:600 11px -apple-system,system-ui,sans-serif;text-anchor:middle;}
    .lg-code{fill:currentColor;font:600 12px ui-monospace,SFMono-Regular,Menlo,monospace;}
    .lg-name{fill:currentColor;font:400 12.5px -apple-system,system-ui,sans-serif;opacity:.85;}
    .cap{fill:currentColor;font:italic 11.5px -apple-system,system-ui,sans-serif;opacity:.55;}
  </style>

  <!-- Vertical mouse from the thumb side: tall sail shape, front (clicks) on the right -->
  <path class="outline" d="M96 300
    C 70 300, 56 282, 58 254
    C 61 208, 76 148, 104 106
    C 126 74, 158 52, 190 50
    C 220 48, 238 66, 238 96
    C 238 130, 226 168, 212 202
    C 200 234, 194 264, 190 280
    C 186 294, 172 300, 150 300 Z"/>
  <!-- Front click edge hint -->
  <path class="inner" d="M212 74 C 222 96, 224 122, 218 146"/>

  <!-- M wheel on the top-front edge -->
  <rect class="pill" x="196" y="84" width="22" height="40" rx="10" transform="rotate(16 207 104)"/>
  <text class="pt" x="209" y="109">M</text>

  <!-- T: DPI key on the top ridge behind the wheel -->
  <rect class="pill" x="162" y="66" width="22" height="18" rx="9"/>
  <text class="pt" x="173" y="79">T</text>

  <!-- S1 / S2 on the thumb face -->
  <rect class="pill" x="120" y="176" width="26" height="18" rx="9"/>
  <text class="pt" x="133" y="189">S2</text>
  <rect class="pill" x="114" y="202" width="26" height="18" rx="9"/>
  <text class="pt" x="127" y="215">S1</text>

  <text class="cap" x="150" y="332" text-anchor="middle">side view · 57° vertical grip · thumb face toward you</text>

  <!-- Legend -->
  <g transform="translate(300,72)">
    <text class="lg-code" x="0" y="0">S1 / S2</text><text class="lg-name" x="82" y="0">side buttons — Back / Forward</text>
    <text class="lg-code" x="0" y="30">T</text><text class="lg-name" x="82" y="30">DPI / pointer-speed key on top —</text>
    <text class="lg-name" x="82" y="48">re-mappable, not a thumb button</text>
    <text class="lg-code" x="0" y="78">M</text><text class="lg-name" x="82" y="78">wheel click</text>
    <text class="lg-code" x="0" y="108">L / R</text><text class="lg-name" x="82" y="108">main clicks (macOS)</text>
    <text class="cap" x="0" y="148">4 configurable slots · full HID++ recognition</text>
    <text class="cap" x="0" y="170">left- and right-hand variants share the same slots</text>
  </g>
</svg>
