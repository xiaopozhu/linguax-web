<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 380" role="img" aria-labelledby="mx-ergo-title mx-ergo-desc">
  <title id="mx-ergo-title">MX Ergo trackball — LinguaX click-based slot layout</title>
  <desc id="mx-ergo-desc">Top-down schematic of the MX Ergo trackball showing the three configurable click slots exposed by LinguaX's universal HID engine today: M (wheel click), S1 / S2 (side buttons). The Precision (DPI) button next to the ball is currently firmware-controlled and not yet a LinguaX slot.</desc>
  <style>
    .body{fill:none;stroke:currentColor;stroke-width:2;}
    .divider{stroke:currentColor;stroke-width:1;stroke-dasharray:4 4;opacity:.35;}
    .slot{fill:currentColor;}
    .slot-inactive{fill:none;stroke:currentColor;stroke-width:1.5;stroke-dasharray:2 3;opacity:.55;}
    .label{fill:currentColor;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',system-ui,sans-serif;font-size:14px;font-weight:600;}
    .caption{fill:currentColor;font-family:-apple-system,system-ui,sans-serif;font-size:12px;opacity:.7;}
  </style>
  <!-- Body: wide, angled base (trackball unit sits on a tilted pad) -->
  <path class="body" d="M60 90 C 60 60, 100 40, 170 40 C 250 40, 290 70, 290 130 L 290 300 C 290 340, 250 350, 170 350 C 100 350, 60 320, 60 280 Z" />
  <!-- L / R click divider (upper right area, right side of trackball) -->
  <line class="divider" x1="200" y1="60" x2="200" y2="200" />
  <text class="label" x="240" y="100">R</text>
  <text class="label" x="230" y="150">L</text>
  <!-- Wheel M (right-center) -->
  <rect class="body" x="255" y="150" width="22" height="50" rx="6" />
  <text class="label" x="280" y="185">M</text>
  <text class="caption" x="280" y="200">wheel click</text>
  <!-- Trackball (left, prominent circle) -->
  <circle class="body" cx="130" cy="180" r="55" stroke-width="2.5" />
  <text class="label" x="130" y="185" text-anchor="middle">ball</text>
  <!-- Precision button (inactive, next to the ball) -->
  <circle class="slot-inactive" cx="90" cy="260" r="7" />
  <text class="caption" x="105" y="265" text-anchor="start" font-style="italic">Precision (DPI)</text>
  <text class="caption" x="105" y="280" text-anchor="start" font-style="italic">firmware-controlled</text>
  <text class="caption" x="105" y="295" text-anchor="start" font-style="italic">not yet a LinguaX slot</text>
  <!-- S1 / S2 upper left (thumb side; MX Ergo has 2 side buttons above ball) -->
  <circle class="slot" cx="75" cy="115" r="6" />
  <text class="label" x="90" y="120">S1</text>
  <text class="caption" x="90" y="135">side back</text>
  <circle class="slot" cx="110" cy="90" r="6" />
  <text class="label" x="125" y="95">S2</text>
  <text class="caption" x="125" y="110">side forward</text>
  <!-- Tilt callout -->
  <text class="caption" x="170" y="370" text-anchor="middle" font-style="italic">0° / 20° hardware tilt adjustment</text>
</svg>
