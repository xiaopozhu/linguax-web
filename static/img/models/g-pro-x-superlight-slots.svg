<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-labelledby="gpx-t gpx-d">
  <title id="gpx-t">Logitech G Pro X Superlight — LinguaX slot layout</title>
  <desc id="gpx-d">Top-down wireframe of the G Pro X Superlight, front at top. Symmetric esports body with a subtle waist. Two main click plates L and R flank the scroll wheel; M is the wheel click; S1 and S2 are the two side buttons on the thumb flank. Recognized through the universal HID engine — no HID++ profile. 3 mappable slots.</desc>
  <style>
    .outline{fill:none;stroke:currentColor;stroke-width:2.2;stroke-linejoin:round;stroke-linecap:round;}
    .seam{fill:none;stroke:currentColor;stroke-width:1.5;opacity:.5;stroke-linecap:round;}
    .tread{stroke:currentColor;stroke-width:1;opacity:.35;stroke-linecap:round;}
    .part{fill:currentColor;opacity:.08;stroke:currentColor;stroke-width:1.3;stroke-opacity:.5;}
    .lead{fill:none;stroke:currentColor;stroke-width:1;opacity:.45;}
    .dot{fill:currentColor;}
    .ghost{fill:currentColor;font:600 12px -apple-system,system-ui,sans-serif;text-anchor:middle;opacity:.5;}
    .code{fill:currentColor;font:600 12px ui-monospace,SFMono-Regular,Menlo,monospace;}
    .name{fill:currentColor;font:400 11.5px -apple-system,system-ui,sans-serif;opacity:.7;}
    .cap{fill:currentColor;font:italic 11.5px -apple-system,system-ui,sans-serif;opacity:.55;}
  </style>

  <g transform="translate(230,20)">
    <!-- ===== Body: perfectly symmetric esports egg with a subtle waist ===== -->
    <path class="outline" d="M145 30
      C 172 22, 198 30, 210 60
      C 220 88, 222 130, 218 168
      C 214 200, 208 220, 210 240
      C 214 262, 214 282, 200 300
      C 186 316, 168 322, 145 322
      C 122 322, 104 316, 90 300
      C 76 282, 76 262, 80 240
      C 82 220, 76 200, 72 168
      C 68 130, 70 88, 80 60
      C 92 30, 118 22, 145 30 Z"/>

    <!-- ===== Click plates: single central seam splits the front half ===== -->
    <path class="seam" d="M145 30 L 145 142"/>
    <!-- Rear seam of the click plates -->
    <path class="seam" d="M78 146 C 108 158, 182 158, 212 146"/>
    <text class="ghost" x="118" y="86">L</text>
    <text class="ghost" x="172" y="86">R</text>

    <!-- ===== Main wheel ===== -->
    <rect class="part" x="138" y="60" width="14" height="56" rx="7"/>
    <line class="tread" x1="140.5" y1="70" x2="149.5" y2="70"/>
    <line class="tread" x1="140.5" y1="80" x2="149.5" y2="80"/>
    <line class="tread" x1="140.5" y1="90" x2="149.5" y2="90"/>
    <line class="tread" x1="140.5" y1="100" x2="149.5" y2="100"/>
    <line class="tread" x1="140.5" y1="110" x2="149.5" y2="110"/>

    <!-- ===== S1 / S2 — on the left flank ===== -->
    <rect class="part" x="76" y="150" width="22" height="15" rx="7.5"/>
    <rect class="part" x="76" y="170" width="22" height="15" rx="7.5"/>
  </g>

  <!-- ===== Callouts — left (thumb side) ===== -->
  <g>
    <!-- S2 -->
    <path class="lead" d="M306 170 L 260 140 L 240 140"/>
    <circle class="dot" cx="306" cy="170" r="2.4"/>
    <text class="code" x="234" y="137" text-anchor="end">S2</text>
    <text class="name" x="234" y="152" text-anchor="end">side button — Forward</text>

    <!-- S1 -->
    <path class="lead" d="M306 190 L 260 190 L 240 190"/>
    <circle class="dot" cx="306" cy="190" r="2.4"/>
    <text class="code" x="234" y="187" text-anchor="end">S1</text>
    <text class="name" x="234" y="202" text-anchor="end">side button — Back</text>
  </g>

  <!-- ===== Callouts — right (top side) ===== -->
  <g>
    <!-- M -->
    <path class="lead" d="M381 72 L 450 72 L 470 72"/>
    <circle class="dot" cx="381" cy="72" r="2.4"/>
    <text class="code" x="476" y="69">M</text>
    <text class="name" x="476" y="84">wheel click</text>

    <!-- L / R note -->
    <text class="code" x="476" y="140">L / R</text>
    <text class="name" x="476" y="155">main clicks (macOS)</text>
  </g>

  <text class="cap" x="320" y="370" text-anchor="middle">top-down · symmetric esports body · 3 mappable slots (M, S1, S2) · universal HID engine — no HID++ profile</text>
</svg>
