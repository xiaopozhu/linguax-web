<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 380" role="img" aria-labelledby="mx-anywhere-title mx-anywhere-desc">
  <title id="mx-anywhere-title">MX Anywhere 3 / 3S — LinguaX button slot layout</title>
  <desc id="mx-anywhere-desc">Top-down schematic of the portable MX Anywhere 3 and 3S showing the four configurable slots exposed by LinguaX: M (wheel click), SM (scroll mode), S1 / S2 (side buttons). No Thumb (T) button; no Wheel Tilt.</desc>
  <style>
    .body{fill:none;stroke:currentColor;stroke-width:2;}
    .divider{stroke:currentColor;stroke-width:1;stroke-dasharray:4 4;opacity:.35;}
    .slot{fill:currentColor;}
    .label{fill:currentColor;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',system-ui,sans-serif;font-size:14px;font-weight:600;}
    .caption{fill:currentColor;font-family:-apple-system,system-ui,sans-serif;font-size:12px;opacity:.7;}
  </style>
  <!-- Body: compact rounded rectangle (smaller than Master) -->
  <rect class="body" x="60" y="30" width="180" height="320" rx="80" />
  <!-- L / R click split -->
  <line class="divider" x1="150" y1="30" x2="150" y2="170" />
  <text class="label" x="105" y="95" text-anchor="middle">L</text>
  <text class="label" x="195" y="95" text-anchor="middle">R</text>
  <!-- Wheel (M) -->
  <rect class="body" x="135" y="115" width="30" height="60" rx="8" />
  <text class="label" x="180" y="150">M</text>
  <text class="caption" x="180" y="166">wheel click</text>
  <!-- SM (behind wheel) -->
  <circle class="slot" cx="150" cy="200" r="6" />
  <text class="label" x="165" y="205">SM</text>
  <text class="caption" x="165" y="220">scroll mode</text>
  <!-- S1 / S2 on left edge (thumb side) -->
  <circle class="slot" cx="65" cy="200" r="6" />
  <text class="label" x="80" y="205" text-anchor="start">S1</text>
  <text class="caption" x="80" y="220" text-anchor="start">side back</text>
  <circle class="slot" cx="65" cy="240" r="6" />
  <text class="label" x="80" y="245" text-anchor="start">S2</text>
  <text class="caption" x="80" y="260" text-anchor="start">side forward</text>
  <!-- Absence note -->
  <text class="caption" x="150" y="330" text-anchor="middle" font-style="italic">no Thumb button · no Wheel Tilt</text>
</svg>
