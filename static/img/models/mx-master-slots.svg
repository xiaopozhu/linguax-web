<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 360" role="img" aria-labelledby="mxm-t mxm-d">
  <title id="mxm-t">MX Master 3 / 3S — LinguaX slot layout</title>
  <desc id="mxm-d">Top-down view of the MX Master with its seven configurable LinguaX slots: S1 and S2 side buttons, T thumb button, M wheel click, SM scroll-mode key, WL and WR wheel tilt. Legend on the right names each slot.</desc>
  <style>
    .outline{fill:none;stroke:currentColor;stroke-width:2;}
    .split{stroke:currentColor;stroke-width:1;stroke-dasharray:4 4;opacity:.3;fill:none;}
    .pill{fill:currentColor;opacity:.12;stroke:currentColor;stroke-width:1.2;}
    .pt{fill:currentColor;font:600 11px -apple-system,system-ui,sans-serif;text-anchor:middle;}
    .lg-code{fill:currentColor;font:600 12px ui-monospace,SFMono-Regular,Menlo,monospace;}
    .lg-name{fill:currentColor;font:400 12.5px -apple-system,system-ui,sans-serif;opacity:.85;}
    .cap{fill:currentColor;font:italic 11.5px -apple-system,system-ui,sans-serif;opacity:.55;}
  </style>

  <!-- Body: top-down, front at top, thumb flare on the left -->
  <path class="outline" d="M120 22
    C 84 22, 56 52, 52 116
    C 50 152, 44 170, 34 190
    C 22 214, 24 250, 44 266
    C 58 277, 78 276, 90 264
    C 100 254, 104 244, 108 232
    C 118 268, 142 300, 172 306
    C 206 312, 232 288, 238 244
    L 242 120
    C 242 56, 196 22, 156 22
    Z"/>

  <!-- L / R split + wheel area -->
  <path class="split" d="M148 22 L 146 120"/>
  <text class="pt" x="106" y="72" opacity=".45">L</text>
  <text class="pt" x="196" y="72" opacity=".45">R</text>

  <!-- M wheel -->
  <rect class="pill" x="132" y="58" width="26" height="58" rx="12"/>
  <text class="pt" x="145" y="92">M</text>

  <!-- WL / WR tilt arrows beside wheel -->
  <text class="pt" x="112" y="92">◂WL</text>
  <text class="pt" x="180" y="92">WR▸</text>

  <!-- SM behind wheel -->
  <rect class="pill" x="131" y="130" width="28" height="18" rx="9"/>
  <text class="pt" x="145" y="143">SM</text>

  <!-- S1 / S2 on thumb shelf (left edge), forward = S2 -->
  <rect class="pill" x="58" y="150" width="26" height="18" rx="9"/>
  <text class="pt" x="71" y="163">S2</text>
  <rect class="pill" x="52" y="176" width="26" height="18" rx="9"/>
  <text class="pt" x="65" y="189">S1</text>

  <!-- T on thumb rest (lower-left flare) -->
  <rect class="pill" x="44" y="224" width="24" height="18" rx="9"/>
  <text class="pt" x="56" y="237">T</text>

  <text class="cap" x="145" y="336" text-anchor="middle">top-down · front at top · thumb side on the left</text>

  <!-- Legend -->
  <g transform="translate(300,50)">
    <text class="lg-code" x="0" y="0">S1 / S2</text><text class="lg-name" x="78" y="0">side buttons — Back / Forward by default</text>
    <text class="lg-code" x="0" y="30">T</text><text class="lg-name" x="78" y="30">thumb button — long-press &amp; 4-way swipe</text>
    <text class="lg-code" x="0" y="60">M</text><text class="lg-name" x="78" y="60">wheel click</text>
    <text class="lg-code" x="0" y="90">SM</text><text class="lg-name" x="78" y="90">scroll-mode key — MagSpeed toggle</text>
    <text class="lg-code" x="0" y="120">WL / WR</text><text class="lg-name" x="78" y="120">wheel tilt left / right</text>
    <text class="lg-code" x="0" y="150">L / R</text><text class="lg-name" x="78" y="150">main clicks — handled by macOS</text>
    <text class="cap" x="0" y="190">7 configurable slots · full HID++ recognition</text>
  </g>
</svg>
