<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-labelledby="mxm-t mxm-d">
  <title id="mxm-t">MX Master 3 / 3S — LinguaX slot layout</title>
  <desc id="mxm-d">Top-down wireframe of the MX Master, front at top, thumb wing on the left. The L and R main click plates flank the scroll wheel at the front. Callouts on the left mark the thumb-side controls: the thumb wheel (WL and WR, horizontal scroll), the side buttons S2 and S1 behind it, and the gesture button T on the thumb rest. Callouts on the right mark the M wheel click and the SM scroll-mode key behind the wheel.</desc>
  <style>
    .outline{fill:none;stroke:currentColor;stroke-width:2.2;stroke-linejoin:round;stroke-linecap:round;}
    .seam{fill:none;stroke:currentColor;stroke-width:1.5;opacity:.5;stroke-linecap:round;}
    .inner{fill:none;stroke:currentColor;stroke-width:1.2;opacity:.28;stroke-linecap:round;}
    .tread{stroke:currentColor;stroke-width:1;opacity:.35;stroke-linecap:round;}
    .part{fill:currentColor;opacity:.08;stroke:currentColor;stroke-width:1.3;stroke-opacity:.5;}
    .lead{fill:none;stroke:currentColor;stroke-width:1;opacity:.45;}
    .dot{fill:currentColor;}
    .ghost{fill:currentColor;font:600 12px -apple-system,system-ui,sans-serif;text-anchor:middle;opacity:.5;}
    .code{fill:currentColor;font:600 12px ui-monospace,SFMono-Regular,Menlo,monospace;}
    .name{fill:currentColor;font:400 11.5px -apple-system,system-ui,sans-serif;opacity:.7;}
    .cap{fill:currentColor;font:italic 11.5px -apple-system,system-ui,sans-serif;opacity:.55;}
  </style>

  <g transform="translate(196,0)">
    <!-- ===== Body: right-hand ergonomic, front at top, thumb wing on the left ===== -->
    <path class="outline" d="M120 52
      C 142 38, 190 36, 213 54
      C 237 73, 251 112, 253 152
      C 255 202, 248 262, 232 301
      C 219 331, 196 347, 167 347
      C 138 347, 114 331, 101 301
      C 95 284, 91 269, 89 257
      C 66 256, 42 238, 40 210
      C 38 176, 58 141, 80 131
      C 83 100, 96 68, 120 52 Z"/>

    <!-- Flank wall: where the thumb wing meets the body -->
    <path class="inner" d="M80 131 C 91 165, 92 220, 89 257"/>

    <!-- ===== Click plates ===== -->
    <path class="seam" d="M120 52 C 108 88, 106 122, 110 152 C 128 160, 144 162, 152 162"/>
    <path class="seam" d="M213 54 C 228 90, 232 124, 228 154 C 210 162, 192 163, 181 162"/>
    <path class="seam" d="M152 46 L 152 162"/>
    <path class="seam" d="M181 46 L 181 162"/>
    <text class="ghost" x="129" y="112">L</text>
    <text class="ghost" x="206" y="112">R</text>

    <!-- ===== Main wheel ===== -->
    <rect class="part" x="153.5" y="62" width="26" height="66" rx="12"/>
    <line class="tread" x1="156" y1="74" x2="177" y2="74"/>
    <line class="tread" x1="156" y1="85" x2="177" y2="85"/>
    <line class="tread" x1="156" y1="96" x2="177" y2="96"/>
    <line class="tread" x1="156" y1="107" x2="177" y2="107"/>
    <line class="tread" x1="156" y1="118" x2="177" y2="118"/>

    <!-- ===== SM — scroll-mode key behind the wheel ===== -->
    <rect class="part" x="153" y="176" width="28" height="18" rx="9"/>

    <!-- ===== Thumb wheel — on the flank, forward ===== -->
    <rect class="part" x="76" y="136" width="20" height="38" rx="9"/>
    <line class="tread" x1="79" y1="144" x2="93" y2="144"/>
    <line class="tread" x1="79" y1="152" x2="93" y2="152"/>
    <line class="tread" x1="79" y1="160" x2="93" y2="160"/>
    <line class="tread" x1="79" y1="168" x2="93" y2="168"/>

    <!-- ===== S2 / S1 — side buttons on the flank, behind the thumb wheel ===== -->
    <rect class="part" x="78" y="180" width="22" height="15" rx="7.5"/>
    <rect class="part" x="78" y="199" width="22" height="15" rx="7.5"/>

    <!-- ===== T — gesture button at the rear of the thumb rest ===== -->
    <ellipse class="part" cx="60" cy="230" rx="15" ry="18" transform="rotate(-14 60 230)"/>
  </g>

  <!-- ===== Callouts — left (thumb side) ===== -->
  <g>
    <!-- thumb wheel -->
    <path class="lead" d="M272 155 L 244 122 L 224 122"/>
    <circle class="dot" cx="272" cy="155" r="2.4"/>
    <text class="code" x="218" y="119" text-anchor="end">WL / WR</text>
    <text class="name" x="218" y="134" text-anchor="end">thumb wheel — scroll L / R</text>

    <!-- S2 -->
    <path class="lead" d="M275 188 L 248 172 L 224 172"/>
    <circle class="dot" cx="275" cy="188" r="2.4"/>
    <text class="code" x="218" y="169" text-anchor="end">S2</text>
    <text class="name" x="218" y="184" text-anchor="end">side button — Forward</text>

    <!-- S1 -->
    <path class="lead" d="M275 207 L 248 222 L 224 222"/>
    <circle class="dot" cx="275" cy="207" r="2.4"/>
    <text class="code" x="218" y="219" text-anchor="end">S1</text>
    <text class="name" x="218" y="234" text-anchor="end">side button — Back</text>

    <!-- T -->
    <path class="lead" d="M252 234 L 240 272 L 224 272"/>
    <circle class="dot" cx="252" cy="234" r="2.4"/>
    <text class="code" x="218" y="269" text-anchor="end">T</text>
    <text class="name" x="218" y="284" text-anchor="end">thumb rest gesture button</text>
  </g>

  <!-- ===== Callouts — right (top side) ===== -->
  <g>
    <!-- M -->
    <path class="lead" d="M362 95 L 440 84 L 464 84"/>
    <circle class="dot" cx="362" cy="95" r="2.4"/>
    <text class="code" x="470" y="81">M</text>
    <text class="name" x="470" y="96">wheel click</text>

    <!-- SM -->
    <path class="lead" d="M363 185 L 440 190 L 464 190"/>
    <circle class="dot" cx="363" cy="185" r="2.4"/>
    <text class="code" x="470" y="187">SM</text>
    <text class="name" x="470" y="202">scroll-mode key</text>

    <!-- L / R note, no leader — the plates carry ghost labels -->
    <text class="code" x="470" y="290">L / R</text>
    <text class="name" x="470" y="305">main clicks (macOS)</text>
  </g>

  <text class="cap" x="320" y="378" text-anchor="middle">top-down · front at top · thumb wing on the left · 7 configurable slots</text>
</svg>
